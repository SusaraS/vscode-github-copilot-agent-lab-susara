<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-cyber-dark">
    <div class="text-center max-w-sm w-full animate-neon-pop">

        <span class="chip-btn inline-block mb-4 px-3 py-1.5 rounded text-xs font-semibold uppercase tracking-widest text-neon-cyan">
            ◈ Live Mixer Event
        </span>

        <h1 class="text-6xl font-bold text-neon-cyan text-glow-cyan mb-2">Soc Ops</h1>
        <p class="text-xl text-neon-soft mb-8">Find your people.<br>Own the room.</p>

        <div class="neon-panel rounded-xl p-6 shadow-xl mb-8">
            <h2 class="font-semibold text-neon-cyan mb-3 text-sm uppercase tracking-widest">How to play</h2>
            <ul class="text-left text-neon-soft text-sm space-y-2">
                <li>• Find someone who matches each square</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-neon text-neon-ink font-semibold py-4 px-8 rounded-lg text-lg transition-all duration-150 hover:lift hover:glow-cyan active:square-active">
            Start Game
        </button>
    </div>
</div>
</div>
