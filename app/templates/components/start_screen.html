<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-cyber-dark">
    <div class="max-w-sm w-full animate-neon-pop">

        <!-- Status chips row -->
        <div class="flex gap-2 mb-6 justify-center">
            <span class="status-chip text-neon-lime">● Active</span>
            <span class="status-chip text-neon-cyan">Mission 001</span>
            <span class="status-chip text-neon-pink">Dev Edition</span>
        </div>

        <!-- Hero heading -->
        <div class="text-center mb-6">
            <div class="text-xs text-neon-muted tracking-widest uppercase mb-2">Developer Edition</div>
            <h1 class="text-5xl font-bold text-neon-cyan text-glow-cyan mb-1">Tech Life</h1>
            <p class="text-lg font-bold text-neon-pink text-glow-pink mb-1">BINGO</p>
            <p class="text-sm text-neon-soft tracking-wide">Coding Habits // IDE Wars // Dev Culture</p>
        </div>

        <!-- Tactical brief panel -->
        <div class="neon-panel rounded-xl p-5 mb-6">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-xs font-bold tracking-widest uppercase text-neon-pink">Mission Brief</span>
                <span class="mission-divider flex-1"></span>
            </div>
            <h2 class="text-sm font-semibold text-neon-cyan mb-3">How to play</h2>
            <ol class="space-y-2">
                <li class="flex gap-3 text-sm text-neon-soft">
                    <span class="step-num">01</span>
                    <span>Find developers who match the prompts</span>
                </li>
                <li class="flex gap-3 text-sm text-neon-soft">
                    <span class="step-num">02</span>
                    <span>Tap a square when you find a match</span>
                </li>
                <li class="flex gap-3 text-sm text-neon-soft">
                    <span class="step-num">03</span>
                    <span>Get 5 in a row to complete the mission!</span>
                </li>
            </ol>
        </div>

        <!-- Primary CTA -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-neon text-neon-ink font-semibold py-4 px-8 rounded-lg text-lg transition-all duration-150 hover:lift hover:glow-cyan active:square-active">
            Start Game
        </button>

    </div>
</div>
</div>
