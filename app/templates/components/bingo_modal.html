<div class="fixed inset-0 cyber-overlay flex items-center justify-center p-4 z-50">
    <div class="neon-panel rounded-xl p-6 max-w-xs w-full text-center shadow-xl animate-neon-pop border border-neon-pink">
        <div class="text-5xl mb-4">{{ '🎯' if session.is_scavenger_mode else '🎉' }}</div>
        <h2 class="text-3xl font-bold mb-2 {% if session.is_scavenger_mode %}text-neon-cyan text-glow-cyan{% else %}text-neon-pink text-glow-pink{% endif %}">{{ session.modal_title }}</h2>
        <p class="text-neon-soft mb-6">{{ session.modal_message }}</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-neon text-neon-ink font-semibold py-3 px-6 rounded-lg transition-all duration-150 hover:lift hover:glow-pink active:square-active">
            Keep Playing
        </button>
    </div>
</div>
