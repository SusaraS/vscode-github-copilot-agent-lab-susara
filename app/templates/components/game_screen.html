<div id="game-container">
<div class="flex flex-col min-h-full bg-cyber-dark">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 neon-bar border-b border-neon-cyan">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="chip-btn text-neon-soft text-sm px-3 py-1.5 rounded transition-all duration-150 hover:lift-sm hover:glow-cyan active:square-active">
            ← Back
        </button>
        <h1 class="font-bold text-neon-cyan text-glow-cyan">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-neon-muted text-sm py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="neon-banner text-neon-ink text-center py-2 font-semibold text-sm">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
